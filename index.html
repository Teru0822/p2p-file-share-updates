<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2Pファイル共有</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .title { font-size: 28px; font-weight: bold; color: #333; }
        .subtitle { color: #666; font-size: 14px; margin-top: 5px; }
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: #f0f9ff;
            border-radius: 10px;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .info-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            color: white;
        }
        .info-label { font-size: 14px; opacity: 0.9; margin-bottom: 8px; }
        .info-value {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: monospace;
            font-size: 18px;
            font-weight: bold;
            background: rgba(255,255,255,0.2);
            padding: 12px 16px;
            border-radius: 10px;
        }
        .edit-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        .edit-btn:hover { background: #f0f0f0; }
        
        .peer-item {
            display: flex;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            color: white;
            margin-bottom: 15px;
            transition: all 0.3s;
            position: relative;
        }
        .peer-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        .peer-item.drag-over {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            transform: scale(1.02);
        }
        .peer-item.drag-over::after {
            content: '📁 ここにドロップ';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
        }
        .peer-checkbox {
            width: 24px;
            height: 24px;
            margin-right: 15px;
            cursor: pointer;
        }
        .peer-info { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            flex: 1;
        }
        .peer-avatar {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .peer-name { font-weight: bold; font-size: 18px; }
        .peer-ip { font-size: 12px; opacity: 0.8; font-family: monospace; }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-success { background: rgba(255,255,255,0.3); color: white; }
        .btn-success:hover { background: rgba(255,255,255,0.5); }
        
        .send-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 20px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.2);
            display: none;
            justify-content: center;
            align-items: center;
            gap: 15px;
            z-index: 999;
        }
        .send-bar.show { display: flex; }
        .send-bar-info { font-weight: bold; color: #333; }
        .btn-primary {
            background: #667eea;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-primary:hover { background: #5568d3; }
        .btn-secondary {
            background: #e5e7eb;
            color: #333;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-secondary:hover { background: #d1d5db; }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-icon { font-size: 64px; margin-bottom: 20px; }
        
        .text-send-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            margin-left: 8px;
        }
        .text-send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }
        .text-modal, .received-text-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .text-modal.active, .received-text-modal.active {
            display: flex;
        }
        .text-modal-content, .received-text-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .text-modal-header, .received-text-header {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }
        .received-text-from {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .text-input {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            margin-bottom: 20px;
        }
        .text-input:focus {
            outline: none;
            border-color: #667eea;
        }
        .received-text-body {
            padding: 15px;
            background: #f9fafb;
            border-radius: 10px;
            margin-bottom: 20px;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: inherit;
            max-height: 400px;
            overflow-y: auto;
        }
        .text-modal-buttons, .received-text-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .text-modal-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .text-modal-btn.cancel {
            background: #e5e7eb;
            color: #333;
        }
        .text-modal-btn.send {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .text-modal-btn:hover {
            transform: translateY(-2px);
        }
        .progress-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .progress-overlay.show { display: flex; }
        .progress-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            min-width: 400px;
            text-align: center;
        }
        .progress-title { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .progress-file { color: #666; margin-bottom: 20px; word-break: break-all; }
        .progress-bar-container {
            width: 100%;
            height: 30px;
            background: #e5e7eb;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .cancel-btn {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
        .cancel-btn:hover { background: #dc2626; }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            min-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .modal-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }
        .modal-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .modal-input:focus {
            outline: none;
            border-color: #667eea;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
        }
        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        .modal-btn-primary {
            background: #667eea;
            color: white;
        }
        .modal-btn-primary:hover { background: #5568d3; }
        .modal-btn-secondary {
            background: #e5e7eb;
            color: #333;
        }
        .modal-btn-secondary:hover { background: #d1d5db; }
        
        .update-banner {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #22c55e;
            color: white;
            padding: 15px 50px 15px 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(34, 197, 94, 0.3);
            cursor: pointer;
            z-index: 4000;
            animation: slideIn 0.3s;
        }
        @keyframes slideIn {
            from { transform: translateX(400px); }
            to { transform: translateX(0); }
        }
        .update-banner:hover { background: #16a34a; }
        .update-banner-close {
            position: absolute;
            top: 5px;
            right: 10px;
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 0;
            width: 25px;
            height: 25px;
            line-height: 25px;
            text-align: center;
        }
        .update-banner-close:hover { opacity: 0.7; }
        /* ファイル添付セクション */
        .file-attach-section {
            border: 2px dashed #e5e7eb;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .file-attach-section:hover {
            border-color: #667eea;
            background: #f9fafb;
        }
        .file-attach-section.has-files {
            border-color: #10b981;
            background: #f0fdf4;
        }
        .file-list {
            margin-top: 15px;
            text-align: left;
        }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: white;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .file-item-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }
        .file-remove-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        .file-remove-btn:hover {
            background: #dc2626;
        }
        .received-files {
            margin-top: 15px;
        }
        .received-file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: #f0f9ff;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .received-file-save-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        .received-file-save-btn:hover {
            background: #5568d3;
        }        
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div>
                    <div class="title">📡 P2Pファイル共有 v2.2.0</div>
                    <div class="subtitle" id="statusText">待機中...</div>
                </div>
                <div class="status">
                    <div class="status-dot"></div>
                    <span>LAN検索中</span>
                </div>
            </div>

            <div class="info-box">
                <div class="info-label">💻 あなたのPC名</div>
                <div class="info-value">
                    <span id="myName">Loading...</span>
                    <button class="edit-btn" onclick="openNameModal()">✏️ 編集</button>
                </div>
            </div>

            <div class="card">
                <h3 style="margin-bottom: 20px;">🌐 ネットワーク上のデバイス (<span id="peerCount">0</span>台)</h3>
                <div id="peerList">
                    <div class="empty-state">
                        <div class="empty-icon">🔍</div>
                        <div>ネットワークをスキャンしています...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="send-bar" id="sendBar">
        <div class="send-bar-info">
            <span id="selectedCount">0人</span>選択中
        </div>
        <button class="btn-primary" onclick="sendToSelected()">📤 選択したデバイスに送信</button>
        <button class="btn-secondary" onclick="clearSelection()">選択解除</button>
    </div>

    <div class="progress-overlay" id="progressOverlay">
        <div class="progress-box">
            <div class="progress-title" id="progressTitle">📤 送信中...</div>
            <div class="progress-file" id="progressFile"></div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar">0%</div>
            </div>
            <div id="progressText" style="color: #666; margin-top: 10px;"></div>
            <button class="cancel-btn" onclick="cancelTransfer()">キャンセル</button>
        </div>
    </div>

    <div class="modal-overlay" id="nameModal">
        <div class="modal-box">
            <div class="modal-title">💻 PC名の変更</div>
            <input type="text" id="nameInput" class="modal-input" placeholder="PC名を入力" maxlength="30">
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-secondary" onclick="closeNameModal()">キャンセル</button>
                <button class="modal-btn modal-btn-primary" onclick="saveName()">保存</button>
            </div>
        </div>
    </div>

    <div id="textModal" class="text-modal">
        <div class="text-modal-content">
            <div class="text-modal-header" id="textModalTitle">メッセージ送信</div>
            <textarea id="textInput" class="text-input" placeholder="メッセージを入力（任意）..."></textarea>
            
            <div class="file-attach-section" id="fileAttachSection" 
                 onclick="document.getElementById('textFileInput').click()"
                 ondragover="handleFileAttachDragOver(event)"
                 ondragleave="handleFileAttachDragLeave(event)"
                 ondrop="handleFileAttachDrop(event)">
                <div id="fileAttachPlaceholder">
                    📎 ファイルを添付（クリックまたはドラッグ&ドロップ）
                </div>
                <div class="file-list" id="attachedFileList" style="display: none;"></div>
            </div>
            
            <div class="text-modal-buttons">
                <button class="text-modal-btn cancel" onclick="closeTextModal()">キャンセル</button>
                <button class="text-modal-btn send" onclick="sendTextWithFiles()">送信</button>
            </div>
        </div>
    </div>

    <div id="receivedTextModal" class="received-text-modal">
        <div class="received-text-content">
            <div class="received-text-header">📨 メッセージ受信</div>
            <div class="received-text-from" id="receivedTextFrom">From: </div>
            <div class="received-text-body" id="receivedTextBody"></div>
            <div class="received-files" id="receivedFiles"></div>
            <div class="received-text-buttons">
                <button class="text-modal-btn cancel" onclick="closeReceivedTextModal()">閉じる</button>
                <button class="text-modal-btn send" onclick="copyReceivedText()">📋 コピー</button>
            </div>
        </div>
    </div>

    <input type="file" id="textFileInput" style="display: none;" multiple>

    <script>
        const { ipcRenderer } = require('electron');
        const os = require('os');
        const dgram = require('dgram');
        const net = require('net');
        const https = require('https');
        
        // バージョン情報（このファイルに埋め込み）
        const VERSION_INFO = {
            version: '2.2.7',
            changelog: [
                '✅ IPMessenger風の自動デバイス検出',
                '✅ PC名の自由編集＆即時反映',
                '✅ チェックボックスで複数選択送信',
                '✅ ドラッグ&ドロップでファイル送信',
                '✅ GitHubアップデート機能',
                '💬 テキスト送信機能（完全修正）',
                '🔔 受信時に通知音「ぴこん」',
                '🔄 6時間ごとに自動アップデートチェック',
                '🐛 アップデート保存の完全修正',
                '🐛 テキスト送受信の完全修正',
                '🔧 開発者ツール自動表示'
            ]
        };
        
        const CURRENT_VERSION = VERSION_INFO.version;
        const BROADCAST_PORT = 45678;
        const TRANSFER_PORT = 45679;
        const BROADCAST_INTERVAL = 3000;
        const UPDATE_CHECK_INTERVAL = 6 * 60 * 60 * 1000; // 6時間
        
        let myName = localStorage.getItem('p2p_pc_name') || os.hostname() || 'Unknown PC';
        let myIP = getLocalIP();
        let discoveredPeers = new Map();
        let selectedPeers = new Set();
        let broadcastSocket;
        let transferServer;
        let currentTransfer = null;
        let currentTextTarget = null;
        
        function getLocalIP() {
            const interfaces = os.networkInterfaces();
            for (const name of Object.keys(interfaces)) {
                for (const iface of interfaces[name]) {
                    if (iface.family === 'IPv4' && !iface.internal) {
                        return iface.address;
                    }
                }
            }
            return '127.0.0.1';
        }
        
        function init() {
            console.log('='.repeat(70));
            console.log('🚀 P2P File Share v' + CURRENT_VERSION + ' 起動');
            console.log('='.repeat(70));
            console.log('💻 PC名:', myName);
            console.log('🌐 IP:', myIP);
            console.log('📡 ブロードキャストポート:', BROADCAST_PORT);
            console.log('📤 転送ポート:', TRANSFER_PORT);
            console.log('='.repeat(70));
            
            // 起動時にバージョン情報を必ず保存
            localStorage.setItem('app_version', CURRENT_VERSION);
            console.log('✅ バージョン情報保存:', CURRENT_VERSION);
            
            document.getElementById('myName').textContent = myName;
            document.getElementById('statusText').textContent = `待機中 (${myIP})`;
            
            setupBroadcast();
            setupTransferServer();
            startBroadcasting();
            
            document.getElementById('nameInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') saveName();
            });
            
            // アップデートチェック（起動5秒後）
            setTimeout(checkForUpdates, 5000);
            
            // 定期的なアップデートチェック（6時間ごと）
            setInterval(checkForUpdates, UPDATE_CHECK_INTERVAL);
        }
        
        function setupBroadcast() {
            broadcastSocket = dgram.createSocket({ type: 'udp4', reuseAddr: true });
            
            broadcastSocket.on('error', (err) => {
                console.error('❌ ブロードキャストエラー:', err);
            });
            
            broadcastSocket.on('message', (msg, rinfo) => {
                try {
                    const data = JSON.parse(msg.toString());
                    if (rinfo.address !== myIP && data.type === 'announce') {
                        addPeer(data.name, rinfo.address);
                    }
                } catch (err) {}
            });
            
            broadcastSocket.on('listening', () => {
                broadcastSocket.setBroadcast(true);
                console.log('✅ UDPブロードキャスト待受開始:', BROADCAST_PORT);
            });
            
            broadcastSocket.bind(BROADCAST_PORT);
        }
        
        function setupTransferServer() {
            transferServer = net.createServer((socket) => {
                let receivedData = Buffer.alloc(0);
                let fileInfo = null;
                let expectedSize = 0;
                let isTextMessage = false;
                
                console.log('📥 接続受付:', socket.remoteAddress);
                
                socket.on('data', (data) => {
                    receivedData = Buffer.concat([receivedData, data]);
                    
                    // ヘッダー解析
                    if (!fileInfo && receivedData.length >= 4) {
                        const headerSize = receivedData.readUInt32BE(0);
                        
                        if (receivedData.length >= 4 + headerSize) {
                            const headerJSON = receivedData.slice(4, 4 + headerSize).toString('utf8');
                            fileInfo = JSON.parse(headerJSON);
                            
                            console.log('📋 受信データ情報:', fileInfo);
                            
                            // テキストメッセージの判定
                            if (fileInfo.type === 'text') {
                                isTextMessage = true;
                                expectedSize = 0;
                                
                                console.log('💬 テキストメッセージ受信:', {
                                    from: fileInfo.from,
                                    length: fileInfo.text.length
                                });
                                
                                // 通知音再生
                                playNotificationSound();
                                
                                // モーダル表示
                                showReceivedText(fileInfo.text, fileInfo.from);
                                
                                // 接続を正常終了
                                socket.end();
                                return;
                            }
                            
                            // ファイル転送の場合
                            expectedSize = fileInfo.size;
                            receivedData = receivedData.slice(4 + headerSize);
                            showProgress('📥 受信中...', fileInfo.name, fileInfo.size);
                        }
                    }
                    
                    // ファイルデータ受信中
                    if (fileInfo && !isTextMessage && expectedSize > 0) {
                        updateProgress(receivedData.length, expectedSize, expectedSize);
                    }
                });
                
                socket.on('end', async () => {
                    if (isTextMessage) {
                        console.log('✅ テキスト受信完了');
                        return;
                    }
                    
                    if (fileInfo && receivedData.length === expectedSize) {
                        console.log('✅ ファイル受信完了:', fileInfo.name);
                        
                        const result = await ipcRenderer.invoke('save-file', fileInfo.name, Array.from(receivedData));
                        hideProgress();
                        
                        if (result.success) {
                            playNotificationSound();
                            alert(`✅ ファイル受信完了！\n\nファイル: ${fileInfo.name}\n保存先: ${result.filePath}`);
                        } else {
                            alert('❌ ファイル保存に失敗しました');
                        }
                    }
                });
                
                socket.on('error', (err) => {
                    console.error('❌ ソケットエラー:', err);
                    hideProgress();
                });
            });
            
            transferServer.listen(TRANSFER_PORT, () => {
                console.log('✅ TCP転送サーバー起動:', TRANSFER_PORT);
            });
            
            transferServer.on('error', (err) => {
                console.error('❌ サーバーエラー:', err);
            });
        }
        
        function startBroadcasting() {
            function broadcast() {
                const message = JSON.stringify({
                    type: 'announce',
                    name: myName,
                    ip: myIP
                });
                
                try {
                    broadcastSocket.send(message, BROADCAST_PORT, '255.255.255.255');
                } catch (err) {
                    console.error('❌ 送信エラー:', err);
                }
            }
            
            setTimeout(broadcast, 100);
            setInterval(broadcast, BROADCAST_INTERVAL);
        }
        
        function addPeer(name, ip) {
            discoveredPeers.set(ip, {
                name: name,
                ip: ip,
                lastSeen: Date.now()
            });
            updatePeerList();
        }
        
        function updatePeerList() {
            const now = Date.now();
            const TIMEOUT = 10000;
            
            // タイムアウトしたピアを削除
            for (const [ip, peer] of discoveredPeers) {
                if (now - peer.lastSeen > TIMEOUT) {
                    discoveredPeers.delete(ip);
                    selectedPeers.delete(ip);
                }
            }
            
            const peers = Array.from(discoveredPeers.values());
            document.getElementById('peerCount').textContent = peers.length;
            
            const list = document.getElementById('peerList');
            if (peers.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔍</div>
                        <div>ネットワーク上にデバイスが見つかりません</div>
                    </div>
                `;
            } else {
                list.innerHTML = peers.map(p => `
                    <div class="peer-item" id="peer-${p.ip.replace(/\./g, '-')}"
                         ondragover="handleDragOver(event, '${p.ip}')"
                         ondragleave="handleDragLeave(event, '${p.ip}')"
                         ondrop="handleDrop(event, '${p.ip}')">
                        <input type="checkbox" class="peer-checkbox" 
                               ${selectedPeers.has(p.ip) ? 'checked' : ''}
                               onchange="togglePeer('${p.ip}')">
                        <div class="peer-info">
                            <div class="peer-avatar">💻</div>
                            <div>
                                <div class="peer-name">${p.name}</div>
                                <div class="peer-ip">${p.ip}</div>
                            </div>
                        </div>
                        <button class="text-send-btn" onclick="showTextModal('${p.ip}', '${p.name}')">💬 テキスト</button>
                        <button class="btn btn-success" onclick="sendFile('${p.ip}')">📤 送信</button>
                    </div>
                `).join('');
            }
            updateSendBar();
        }
        
        function togglePeer(ip) {
            if (selectedPeers.has(ip)) {
                selectedPeers.delete(ip);
            } else {
                selectedPeers.add(ip);
            }
            updateSendBar();
        }
        
        function updateSendBar() {
            const sendBar = document.getElementById('sendBar');
            const selectedCount = document.getElementById('selectedCount');
            if (selectedPeers.size > 0) {
                sendBar.classList.add('show');
                selectedCount.textContent = `${selectedPeers.size}人`;
            } else {
                sendBar.classList.remove('show');
            }
        }
        
        function clearSelection() {
            selectedPeers.clear();
            updatePeerList();
        }
        
        function sendToSelected() {
            if (selectedPeers.size === 0) return alert('送信先を選択してください');
            const fileInput = document.getElementById('fileInput');
            fileInput.onchange = (e) => {
                const files = Array.from(e.target.files);
                if (files.length > 0) {
                    sendFilesToMultiple(Array.from(selectedPeers), files);
                }
                e.target.value = '';
            };
            fileInput.click();
        }
        
        function sendFile(targetIP) {
            const fileInput = document.getElementById('fileInput');
            fileInput.onchange = (e) => {
                const files = Array.from(e.target.files);
                if (files.length > 0) {
                    sendFilesToMultiple([targetIP], files);
                }
                e.target.value = '';
            };
            fileInput.click();
        }
        
        function sendFilesToMultiple(targets, files) {
            let targetIndex = 0, fileIndex = 0;
            
            function sendNext() {
                if (targetIndex >= targets.length) {
                    return alert(`✅ 全送信完了！\n\n送信先: ${targets.length}台\nファイル数: ${files.length}`);
                }
                if (fileIndex >= files.length) {
                    targetIndex++;
                    fileIndex = 0;
                    return setTimeout(sendNext, 500);
                }
                sendFileData(targets[targetIndex], files[fileIndex], () => {
                    fileIndex++;
                    setTimeout(sendNext, 500);
                });
            }
            sendNext();
        }
        
        function sendFileData(targetIP, file, callback) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const fileData = Buffer.from(e.target.result);
                const fileInfo = { name: file.name, type: file.type, size: file.size };
                
                const client = net.createConnection({ port: TRANSFER_PORT, host: targetIP }, () => {
                    console.log('📤 ファイル送信開始:', targetIP, file.name);
                    showProgress('📤 送信中...', file.name, file.size);
                    
                    const headerJSON = JSON.stringify(fileInfo);
                    const headerBuffer = Buffer.from(headerJSON, 'utf8');
                    const headerSize = Buffer.alloc(4);
                    headerSize.writeUInt32BE(headerBuffer.length, 0);
                    
                    client.write(headerSize);
                    client.write(headerBuffer);
                    
                    const CHUNK_SIZE = 64 * 1024;
                    let offset = 0;
                    
                    function sendChunk() {
                        if (currentTransfer && currentTransfer.cancelled) {
                            client.end();
                            hideProgress();
                            if (callback) callback();
                            return;
                        }
                        if (offset >= fileData.length) {
                            client.end();
                            hideProgress();
                            console.log('✅ ファイル送信完了:', file.name);
                            if (!callback) alert(`✅ 送信完了！\n\nファイル: ${file.name}`);
                            if (callback) callback();
                            return;
                        }
                        const chunk = fileData.slice(offset, offset + CHUNK_SIZE);
                        client.write(chunk, () => {
                            offset += chunk.length;
                            updateProgress(offset, fileData.length, fileData.length);
                            setTimeout(sendChunk, 10);
                        });
                    }
                    currentTransfer = { cancelled: false };
                    sendChunk();
                });
                
                client.on('error', (err) => {
                    console.error('❌ 送信エラー:', err);
                    hideProgress();
                    if (callback) callback();
                });
            };
            reader.readAsArrayBuffer(file);
        }
        
        function handleDragOver(event, ip) {
            event.preventDefault();
            event.stopPropagation();
            document.getElementById('peer-' + ip.replace(/\./g, '-')).classList.add('drag-over');
        }
        
        function handleDragLeave(event, ip) {
            event.preventDefault();
            document.getElementById('peer-' + ip.replace(/\./g, '-')).classList.remove('drag-over');
        }
        
        function handleDrop(event, ip) {
            event.preventDefault();
            event.stopPropagation();
            document.getElementById('peer-' + ip.replace(/\./g, '-')).classList.remove('drag-over');
            
            const items = event.dataTransfer.items;
            const files = [];
            if (items) {
                for (let i = 0; i < items.length; i++) {
                    if (items[i].kind === 'file') {
                        files.push(items[i].getAsFile());
                    }
                }
            }
            if (files.length > 0) sendFilesToMultiple([ip], files);
        }
        
        function showProgress(title, fileName, fileSize) {
            document.getElementById('progressTitle').textContent = title;
            document.getElementById('progressFile').textContent = fileName;
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('progressBar').textContent = '0%';
            document.getElementById('progressOverlay').classList.add('show');
        }
        
        function updateProgress(current, total, fileSize) {
            const percent = Math.round((current / total) * 100);
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressBar').textContent = percent + '%';
            document.getElementById('progressText').textContent = 
                `${formatBytes(current)} / ${formatBytes(fileSize)}`;
        }
        
        function hideProgress() {
            document.getElementById('progressOverlay').classList.remove('show');
            currentTransfer = null;
        }
        
        function cancelTransfer() {
            if (currentTransfer) currentTransfer.cancelled = true;
            hideProgress();
        }
        
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }
        
        function playNotificationSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(600, audioContext.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.2);
        }
        
        function openNameModal() {
            document.getElementById('nameInput').value = myName;
            document.getElementById('nameModal').classList.add('show');
            document.getElementById('nameInput').focus();
        }
        
        function closeNameModal() {
            document.getElementById('nameModal').classList.remove('show');
        }
        
        function saveName() {
            const newName = document.getElementById('nameInput').value.trim();
            if (newName && newName.length > 0) {
                myName = newName;
                localStorage.setItem('p2p_pc_name', myName);
                document.getElementById('myName').textContent = myName;
                closeNameModal();
                
                const message = JSON.stringify({ type: 'announce', name: myName, ip: myIP });
                broadcastSocket.send(message, BROADCAST_PORT, '255.255.255.255');
                
                console.log('✅ PC名変更:', myName);
            } else {
                alert('PC名を入力してください');
            }
        }
        
        function showTextModal(targetIP, targetName) {
            currentTextTarget = { ip: targetIP, name: targetName };
            const modal = document.getElementById('textModal');
            document.getElementById('textModalTitle').textContent = `${targetName} へテキスト送信`;
            document.getElementById('textInput').value = '';
            modal.classList.add('active');
            document.getElementById('textInput').focus();
        }
        
        function closeTextModal() {
            document.getElementById('textModal').classList.remove('active');
            currentTextTarget = null;
        }
        
        async function sendText() {
            const text = document.getElementById('textInput').value.trim();
            if (!text) {
                alert('テキストを入力してください');
                return;
            }
            
            if (!currentTextTarget) {
                alert('送信先が選択されていません');
                closeTextModal();
                return;
            }
            
            // 送信先情報を保存（モーダルを閉じる前に）
            const targetIP = currentTextTarget.ip;
            const targetName = currentTextTarget.name;
            
            closeTextModal();
            
            try {
                console.log('💬 テキスト送信開始:', targetName);
                await sendTextData(targetIP, text, targetName);
                console.log('✅ テキスト送信完了');
                alert('✅ テキスト送信完了！');
            } catch (err) {
                console.error('❌ テキスト送信エラー:', err);
                alert('❌ テキスト送信エラー: ' + err.message);
            }
        }
        
        function sendTextData(targetIP, text, targetName) {
            return new Promise((resolve, reject) => {
                const client = new net.Socket();
                let connected = false;
                
                const timeout = setTimeout(() => {
                    if (!connected) {
                        client.destroy();
                        reject(new Error('接続タイムアウト'));
                    }
                }, 5000);
                
                client.connect(TRANSFER_PORT, targetIP, () => {
                    connected = true;
                    clearTimeout(timeout);
                    
                    console.log('🔗 接続成功:', targetIP);
                    
                    const metadata = {
                        type: 'text',
                        text: text,
                        from: myName,
                        timestamp: Date.now()
                    };
                    
                    const headerBuffer = Buffer.from(JSON.stringify(metadata), 'utf8');
                    const headerSize = Buffer.alloc(4);
                    headerSize.writeUInt32BE(headerBuffer.length, 0);
                    
                    console.log('📤 データ送信:', { length: text.length, headerSize: headerBuffer.length });
                    
                    // ヘッダーとデータを送信してから接続を閉じる
                    client.write(headerSize);
                    client.write(headerBuffer, () => {
                        console.log('✅ 書き込み完了');
                        // データが確実に送信されるまで少し待つ
                        setTimeout(() => {
                            client.end();
                        }, 100);
                    });
                });
                
                client.on('end', () => {
                    console.log('🔌 接続終了');
                    resolve();
                });
                
                client.on('error', (err) => {
                    console.error('❌ 接続エラー:', err);
                    clearTimeout(timeout);
                    reject(err);
                });
            });
        }
        
        function showReceivedText(text, fromName) {
            const modal = document.getElementById('receivedTextModal');
            document.getElementById('receivedTextFrom').textContent = `From: ${fromName}`;
            document.getElementById('receivedTextBody').textContent = text;
            modal.classList.add('active');
        }
        
        function closeReceivedTextModal() {
            document.getElementById('receivedTextModal').classList.remove('active');
        }
        
        function copyReceivedText() {
            const text = document.getElementById('receivedTextBody').textContent;
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ クリップボードにコピーしました');
            });
        }
        
        function checkForUpdates() {
            const updateUrl = 'https://Teru0822.github.io/p2p-file-share-updates/index.html';
            
            console.log('🔍 アップデートチェック開始...');
            
            https.get(updateUrl, (res) => {
                let data = '';
                res.on('data', (chunk) => { data += chunk; });
                res.on('end', () => {
                    try {
                        const match = data.match(/const VERSION_INFO = ({[\s\S]*?});/);
                        if (!match) {
                            console.log('⚠️ リモートバージョン情報が見つかりません');
                            return;
                        }
                        
                        const remoteVersionInfo = eval('(' + match[1] + ')');
                        const remoteVersion = remoteVersionInfo.version;
                        
                        // 無視リスト確認
                        const ignoredVersion = localStorage.getItem('ignored_update_version');
                        if (remoteVersion === ignoredVersion) {
                            console.log('⏭️ このバージョンは無視リストに登録済み:', remoteVersion);
                            return;
                        }
                        
                        console.log('📊 バージョン比較:');
                        console.log('  現在:', CURRENT_VERSION);
                        console.log('  リモート:', remoteVersion);
                        
                        // HTMLに埋め込まれたバージョンとリモートを比較
                        if (remoteVersion !== CURRENT_VERSION) {
                            console.log('🎉 新しいバージョンを検出:', remoteVersion);
                            showUpdateBanner(remoteVersionInfo);
                        } else {
                            console.log('✅ 最新版です');
                        }
                    } catch (err) {
                        console.error('❌ アップデートチェックエラー:', err);
                    }
                });
            }).on('error', (err) => {
                console.error('❌ HTTP取得エラー:', err);
            });
        }
        
        function showUpdateBanner(versionInfo) {
            if (document.querySelector('.update-banner')) return;
            
            const banner = document.createElement('div');
            banner.className = 'update-banner';
            banner.innerHTML = `
                🎉 新しいバージョン ${versionInfo.version} が利用可能です！<br>クリックしてアップデート
                <button class="update-banner-close" onclick="event.stopPropagation(); ignoreUpdate('${versionInfo.version}'); this.parentElement.remove();">×</button>
            `;
            banner.onclick = () => applyUpdate(versionInfo);
            document.body.appendChild(banner);
        }
        
        async function applyUpdate(versionInfo) {
            const updateUrl = 'https://Teru0822.github.io/p2p-file-share-updates/index.html';
            const banner = document.querySelector('.update-banner');
            if (banner) banner.remove();
            
            console.log('⬇️ アップデート開始:', versionInfo.version);
            showProgress('⬇️ アップデート中...', 'index.htmlをダウンロードしています', 0);
            
            try {
                const result = await ipcRenderer.invoke('download-update', updateUrl, versionInfo.version);
                hideProgress();
                
                if (result.success) {
                    console.log('✅ ファイル保存成功:', result.filePath);
                    
                    // バージョン情報をlocalStorageに保存
                    localStorage.setItem('app_version', versionInfo.version);
                    console.log('✅ localStorage保存:', versionInfo.version);
                    
                    // 確認メッセージ
                    const restartMsg = document.createElement('div');
                    restartMsg.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:40px;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.5);z-index:9999;text-align:center;';
                    restartMsg.innerHTML = `
                        <div style="font-size:24px;font-weight:bold;margin-bottom:10px;">✅ アップデート完了</div>
                        <div style="color:#666;margin-bottom:20px;">v${versionInfo.version} にアップデートしました</div>
                        <div style="color:#666;">3秒後に自動で再起動します...</div>
                    `;
                    document.body.appendChild(restartMsg);
                    
                    // 3秒後に再起動
                    setTimeout(async () => {
                        console.log('🔄 再起動実行');
                        await ipcRenderer.invoke('restart-app');
                    }, 3000);
                } else {
                    console.error('❌ アップデート失敗:', result.error);
                    alert('❌ アップデートに失敗しました: ' + result.error);
                }
            } catch (err) {
                hideProgress();
                console.error('❌ アップデートエラー:', err);
                alert('❌ アップデートエラー: ' + err.message);
            }
        }
        
        function ignoreUpdate(version) {
            localStorage.setItem('ignored_update_version', version);
            console.log('⏭️ アップデート無視:', version);
        }
        
        // ピアリスト定期更新
        setInterval(updatePeerList, 2000);
        
        // 初期化実行
        init();
    </script>
