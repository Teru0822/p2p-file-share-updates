<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2Pファイル共有</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .title { font-size: 28px; font-weight: bold; color: #333; }
        .subtitle { color: #666; font-size: 14px; margin-top: 5px; cursor: pointer; }
        .subtitle:hover { color: #667eea; }
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: #f0f9ff;
            border-radius: 10px;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .info-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            color: white;
        }
        .info-label { font-size: 14px; opacity: 0.9; margin-bottom: 8px; }
        .info-value {
            font-family: monospace;
            font-size: 18px;
            font-weight: bold;
            background: rgba(255,255,255,0.2);
            padding: 12px 16px;
            border-radius: 10px;
        }
        
        .peer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            color: white;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        .peer-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        .peer-info { display: flex; align-items: center; gap: 15px; flex: 1; }
        .peer-avatar {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .peer-name { font-weight: bold; font-size: 18px; }
        .peer-ip { font-size: 12px; opacity: 0.8; font-family: monospace; }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; }
        .btn-success { background: rgba(255,255,255,0.3); color: white; }
        .btn-success:hover { background: rgba(255,255,255,0.5); }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-icon { font-size: 64px; margin-bottom: 20px; }
        
        .progress-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .progress-overlay.show { display: flex; }
        .progress-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            min-width: 400px;
            text-align: center;
        }
        .progress-title { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .progress-file { color: #666; margin-bottom: 20px; word-break: break-all; }
        .progress-bar-container {
            width: 100%;
            height: 30px;
            background: #e5e7eb;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .cancel-btn {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
        .cancel-btn:hover { background: #dc2626; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div>
                    <div class="title">📡 P2Pファイル共有</div>
                    <div class="subtitle" id="statusText" onclick="openUsernameModal()">待機中...</div>
                </div>
                <div class="status">
                    <div class="status-dot"></div>
                    <span>LAN検索中</span>
                </div>
            </div>

            <div class="info-box">
                <div class="info-label">💻 あなたのPC名</div>
                <div class="info-value" id="myName">Loading...</div>
            </div>

            <div class="card">
                <h3 style="margin-bottom: 20px;">🌐 ネットワーク上のデバイス (<span id="peerCount">0</span>台)</h3>
                <div id="peerList">
                    <div class="empty-state">
                        <div class="empty-icon">🔍</div>
                        <div>ネットワークをスキャンしています...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="progress-overlay" id="progressOverlay">
        <div class="progress-box">
            <div class="progress-title" id="progressTitle">📤 送信中...</div>
            <div class="progress-file" id="progressFile"></div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar">0%</div>
            </div>
            <div id="progressText" style="color: #666; margin-top: 10px;"></div>
            <button class="cancel-btn" onclick="cancelTransfer()">キャンセル</button>
        </div>
    </div>

    <input type="file" id="fileInput" style="display: none;" multiple>

    <script>
        const { ipcRenderer } = require('electron');
        const os = require('os');
        const dgram = require('dgram');
        const net = require('net');
        
        // 設定
        const BROADCAST_PORT = 45678;
        const TRANSFER_PORT = 45679;
        const BROADCAST_INTERVAL = 5000; // 5秒ごとにブロードキャスト
        
        let myName = os.hostname() || 'Unknown PC';
        let myIP = getLocalIP();
        let discoveredPeers = new Map();
        let broadcastSocket;
        let transferServer;
        let currentTransfer = null;
        
        // ローカルIPアドレスを取得
        function getLocalIP() {
            const interfaces = os.networkInterfaces();
            for (const name of Object.keys(interfaces)) {
                for (const iface of interfaces[name]) {
                    if (iface.family === 'IPv4' && !iface.internal) {
                        return iface.address;
                    }
                }
            }
            return '127.0.0.1';
        }
        
        // 初期化
        function init() {
            document.getElementById('myName').textContent = myName;
            document.getElementById('statusText').textContent = `待機中 (${myIP})`;
            
            setupBroadcast();
            setupTransferServer();
            startBroadcasting();
            
            console.log('📡 IPMessenger風モード起動');
            console.log('💻 PC名:', myName);
            console.log('🌐 IP:', myIP);
        }
        
        // ブロードキャスト設定
        function setupBroadcast() {
            broadcastSocket = dgram.createSocket('udp4');
            
            broadcastSocket.on('error', (err) => {
                console.error('Broadcast error:', err);
            });
            
            broadcastSocket.on('message', (msg, rinfo) => {
                try {
                    const data = JSON.parse(msg.toString());
                    
                    // 自分自身は無視
                    if (rinfo.address === myIP) return;
                    
                    if (data.type === 'announce') {
                        addPeer(data.name, rinfo.address);
                    }
                } catch (err) {
                    console.error('Message parse error:', err);
                }
            });
            
            broadcastSocket.bind(BROADCAST_PORT, () => {
                broadcastSocket.setBroadcast(true);
                console.log('✅ ブロードキャスト受信開始:', BROADCAST_PORT);
            });
        }
        
        // ファイル転送サーバー設定
        function setupTransferServer() {
            transferServer = net.createServer((socket) => {
                console.log('📥 接続受信:', socket.remoteAddress);
                
                let receivedData = Buffer.alloc(0);
                let fileInfo = null;
                let expectedSize = 0;
                
                socket.on('data', (data) => {
                    receivedData = Buffer.concat([receivedData, data]);
                    
                    // ファイル情報をまだ受信していない場合
                    if (!fileInfo && receivedData.length >= 4) {
                        const headerSize = receivedData.readUInt32BE(0);
                        
                        if (receivedData.length >= 4 + headerSize) {
                            const headerJSON = receivedData.slice(4, 4 + headerSize).toString();
                            fileInfo = JSON.parse(headerJSON);
                            expectedSize = fileInfo.size;
                            receivedData = receivedData.slice(4 + headerSize);
                            
                            console.log('📄 ファイル情報受信:', fileInfo.name, formatBytes(fileInfo.size));
                            showProgress('📥 受信中...', fileInfo.name, fileInfo.size);
                        }
                    }
                    
                    // 進捗更新
                    if (fileInfo) {
                        const progress = (receivedData.length / expectedSize) * 100;
                        updateProgress(receivedData.length, expectedSize, expectedSize);
                    }
                });
                
                socket.on('end', async () => {
                    if (fileInfo && receivedData.length === expectedSize) {
                        console.log('✅ 受信完了:', fileInfo.name);
                        
                        // ファイルを保存
                        const result = await ipcRenderer.invoke('save-file', fileInfo.name, Array.from(receivedData));
                        
                        hideProgress();
                        
                        if (result.success) {
                            alert(`✅ ファイル受信完了！\n\nファイル: ${fileInfo.name}\n保存先: ${result.filePath}`);
                        } else {
                            alert(`❌ 保存エラー: ${result.error}`);
                        }
                    }
                });
                
                socket.on('error', (err) => {
                    console.error('Socket error:', err);
                    hideProgress();
                });
            });
            
            transferServer.listen(TRANSFER_PORT, () => {
                console.log('✅ ファイル転送サーバー起動:', TRANSFER_PORT);
            });
        }
        
        // 定期的なブロードキャスト
        function startBroadcasting() {
            const message = JSON.stringify({
                type: 'announce',
                name: myName,
                ip: myIP
            });
            
            setInterval(() => {
                broadcastSocket.send(message, BROADCAST_PORT, '255.255.255.255', (err) => {
                    if (err) console.error('Broadcast error:', err);
                });
            }, BROADCAST_INTERVAL);
            
            // 初回即座に送信
            broadcastSocket.send(message, BROADCAST_PORT, '255.255.255.255');
        }
        
        // ピアを追加
        function addPeer(name, ip) {
            if (!discoveredPeers.has(ip)) {
                console.log('🆕 新しいデバイス発見:', name, ip);
            }
            
            discoveredPeers.set(ip, {
                name: name,
                ip: ip,
                lastSeen: Date.now()
            });
            
            updatePeerList();
        }
        
        // ピアリスト更新
        function updatePeerList() {
            const now = Date.now();
            const TIMEOUT = 15000; // 15秒応答がなければ削除
            
            // タイムアウトしたピアを削除
            for (const [ip, peer] of discoveredPeers) {
                if (now - peer.lastSeen > TIMEOUT) {
                    discoveredPeers.delete(ip);
                }
            }
            
            const peers = Array.from(discoveredPeers.values());
            document.getElementById('peerCount').textContent = peers.length;
            
            const list = document.getElementById('peerList');
            if (peers.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔍</div>
                        <div>ネットワーク上にデバイスが見つかりません</div>
                    </div>
                `;
            } else {
                list.innerHTML = peers.map(p => `
                    <div class="peer-item">
                        <div class="peer-info">
                            <div class="peer-avatar">💻</div>
                            <div>
                                <div class="peer-name">${p.name}</div>
                                <div class="peer-ip">${p.ip}</div>
                            </div>
                        </div>
                        <button class="btn btn-success" onclick="sendFile('${p.ip}')">📤 送信</button>
                    </div>
                `).join('');
            }
        }
        
        // ファイル送信
        function sendFile(targetIP) {
            const fileInput = document.getElementById('fileInput');
            fileInput.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    sendFileData(targetIP, file);
                }
                e.target.value = '';
            };
            fileInput.click();
        }
        
        // ファイルデータ送信
        function sendFileData(targetIP, file) {
            const reader = new FileReader();
            
            reader.onload = (e) => {
                const fileData = Buffer.from(e.target.result);
                const fileInfo = {
                    name: file.name,
                    type: file.type,
                    size: file.size
                };
                
                const client = net.createConnection({ port: TRANSFER_PORT, host: targetIP }, () => {
                    console.log('🔗 接続確立:', targetIP);
                    showProgress('📤 送信中...', file.name, file.size);
                    
                    // ヘッダー送信
                    const headerJSON = JSON.stringify(fileInfo);
                    const headerBuffer = Buffer.from(headerJSON);
                    const headerSize = Buffer.alloc(4);
                    headerSize.writeUInt32BE(headerBuffer.length, 0);
                    
                    client.write(headerSize);
                    client.write(headerBuffer);
                    
                    // ファイルデータ送信
                    const CHUNK_SIZE = 64 * 1024;
                    let offset = 0;
                    
                    function sendChunk() {
                        if (currentTransfer && currentTransfer.cancelled) {
                            client.end();
                            hideProgress();
                            return;
                        }
                        
                        if (offset >= fileData.length) {
                            client.end();
                            hideProgress();
                            alert(`✅ 送信完了！\n\nファイル: ${file.name}`);
                            return;
                        }
                        
                        const chunk = fileData.slice(offset, offset + CHUNK_SIZE);
                        client.write(chunk, () => {
                            offset += chunk.length;
                            updateProgress(offset, fileData.length, fileData.length);
                            setTimeout(sendChunk, 10);
                        });
                    }
                    
                    currentTransfer = { cancelled: false };
                    sendChunk();
                });
                
                client.on('error', (err) => {
                    console.error('Transfer error:', err);
                    hideProgress();
                    alert('送信エラー: ' + err.message);
                });
            };
            
            reader.readAsArrayBuffer(file);
        }
        
        // 進捗表示
        function showProgress(title, fileName, fileSize) {
            document.getElementById('progressTitle').textContent = title;
            document.getElementById('progressFile').textContent = fileName;
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('progressBar').textContent = '0%';
            document.getElementById('progressOverlay').classList.add('show');
        }
        
        function updateProgress(current, total, fileSize) {
            const percent = Math.round((current / total) * 100);
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressBar').textContent = percent + '%';
            document.getElementById('progressText').textContent = 
                `${formatBytes(current)} / ${formatBytes(fileSize)}`;
        }
        
        function hideProgress() {
            document.getElementById('progressOverlay').classList.remove('show');
            currentTransfer = null;
        }
        
        function cancelTransfer() {
            if (currentTransfer) {
                currentTransfer.cancelled = true;
            }
            hideProgress();
        }
        
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }
        
        function openUsernameModal() {
            const newName = prompt('PC名を入力してください', myName);
            if (newName && newName.trim()) {
                myName = newName.trim();
                document.getElementById('myName').textContent = myName;
                document.getElementById('statusText').textContent = `待機中 (${myIP})`;
            }
        }
        
        // 定期的にピアリストを更新
        setInterval(updatePeerList, 2000);
        
        init();
    </script>
</body>
</html>
