<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2Pファイル共有</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .title { font-size: 28px; font-weight: bold; color: #333; }
        .subtitle { color: #666; font-size: 14px; margin-top: 5px; }
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: #f0f9ff;
            border-radius: 10px;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .info-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            color: white;
        }
        .info-label { font-size: 14px; opacity: 0.9; margin-bottom: 8px; }
        .info-value {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: monospace;
            font-size: 18px;
            font-weight: bold;
            background: rgba(255,255,255,0.2);
            padding: 12px 16px;
            border-radius: 10px;
        }
        .edit-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        .edit-btn:hover { background: #f0f0f0; }
        
        .peer-item {
            display: flex;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            color: white;
            margin-bottom: 15px;
            transition: all 0.3s;
            position: relative;
        }
        .peer-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        .peer-item.drag-over {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            transform: scale(1.02);
        }
        .peer-item.drag-over::after {
            content: '📁 ここにドロップ';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
        }
        .peer-checkbox {
            width: 24px;
            height: 24px;
            margin-right: 15px;
            cursor: pointer;
        }
        .peer-info { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            flex: 1;
        }
        .peer-avatar {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .peer-name { font-weight: bold; font-size: 18px; }
        .peer-ip { font-size: 12px; opacity: 0.8; font-family: monospace; }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-send { 
            background: rgba(255,255,255,0.3); 
            color: white;
        }
        .btn-send:hover { background: rgba(255,255,255,0.5); }
        
        .send-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 20px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.2);
            display: none;
            justify-content: center;
            align-items: center;
            gap: 15px;
            z-index: 999;
        }
        .send-bar.show { display: flex; }
        .send-bar-info { font-weight: bold; color: #333; }
        .btn-primary {
            background: #667eea;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-primary:hover { background: #5568d3; }
        .btn-secondary {
            background: #e5e7eb;
            color: #333;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-secondary:hover { background: #d1d5db; }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-icon { font-size: 64px; margin-bottom: 20px; }
        
        .send-modal, .received-modal, .modal-overlay {
            display: none !important;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            /* --- 修正点: 閉じている時は最背面に飛ばす --- */
            z-index: -1 !important; 
            align-items: center;
            justify-content: center;
            pointer-events: none !important; /* 表示中以外はクリックを絶対に吸わせない */
        }
        
        .send-modal.active, .received-modal.active, .modal-overlay.show {
            display: flex !important;
            pointer-events: auto !important;
            z-index: 9999 !important; 
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }
        .received-from {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .message-input {
            width: 100%;
            min-height: 100px;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            margin-bottom: 15px;
        }
        .message-input:focus {
            outline: none;
            border-color: #667eea;
        }
        .file-attach-section {
            border: 2px dashed #e5e7eb;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        .file-attach-section:hover {
            border-color: #667eea;
            background: #f9fafb;
        }
        .file-attach-section.has-files {
            border-color: #10b981;
            background: #f0fdf4;
        }
        .attach-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 10px;
        }
        .attach-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .attach-btn-file {
            background: #667eea;
            color: white;
        }
        .attach-btn-file:hover {
            background: #5568d3;
        }
        .attach-btn-folder {
            background: #10b981;
            color: white;
        }
        .attach-btn-folder:hover {
            background: #059669;
        }
        .file-list {
            margin-top: 15px;
            text-align: left;
        }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: white;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .file-item.folder {
            background: #f0fdf4;
        }
        .file-item-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }
        .file-remove-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        .file-remove-btn:hover {
            background: #dc2626;
        }
        .received-message-body {
            padding: 15px;
            background: #f9fafb;
            border-radius: 10px;
            margin-bottom: 20px;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: inherit;
            max-height: 400px;
            overflow-y: auto;
        }
        .received-files {
            margin-top: 15px;
        }
        .received-file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: #f0f9ff;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .received-file-save-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        .received-file-save-btn:hover {
            background: #5568d3;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .modal-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .modal-btn.cancel {
            background: #e5e7eb;
            color: #333;
        }
        .modal-btn.action {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .modal-btn:hover {
            transform: translateY(-2px);
        }
        .progress-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        .progress-overlay.show { display: flex; }
        .progress-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            min-width: 400px;
            text-align: center;
        }
        .progress-title { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .progress-file { color: #666; margin-bottom: 20px; word-break: break-all; }
        .progress-bar-container {
            width: 100%;
            height: 30px;
            background: #e5e7eb;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .cancel-btn {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
        .cancel-btn:hover { background: #dc2626; }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 3000;
            pointer-events: none; /* 追加：非表示の時��クリックを透過させる */
        }

        .modal-overlay.show {
            display: flex;
            pointer-events: auto; /* 追加：表示中のみクリックを有効にする */
        }
        .modal-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            min-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .modal-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }
        .modal-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .modal-input:focus {
            outline: none;
            border-color: #667eea;
        }
        .name-modal-buttons {
            display: flex;
            gap: 10px;
        }
        .name-modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        .name-modal-btn-primary {
            background: #667eea;
            color: white;
        }
        .name-modal-btn-primary:hover { background: #5568d3; }
        .name-modal-btn-secondary {
            background: #e5e7eb;
            color: #333;
        }
        .name-modal-btn-secondary:hover { background: #d1d5db; }
        
        .update-banner {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #22c55e;
            color: white;
            padding: 15px 50px 15px 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(34, 197, 94, 0.3);
            cursor: pointer;
            z-index: 4000;
            animation: slideIn 0.3s;
        }
        @keyframes slideIn {
            from { transform: translateX(400px); }
            to { transform: translateX(0); }
        }
        .update-banner:hover { background: #16a34a; }
        .update-banner-close {
            position: absolute;
            top: 5px;
            right: 10px;
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 0;
            width: 25px;
            height: 25px;
            line-height: 25px;
            text-align: center;
        }
        .update-banner-close:hover { opacity: 0.7; }
        
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #22c55e;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 5000;
            animation: slideInUp 0.3s, fadeOut 0.3s 2.7s;
            display: none;
        }
        .toast.show { display: block; }
        .toast.error { background: #ef4444; }
        @keyframes slideInUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div>
                    <div class="title" id="appTitle">📡 P2Pファイル共有</div>
                    <div class="subtitle" id="statusText">待機中...</div>
                </div>
                <div class="status">
                    <div class="status-dot"></div>
                    <span>LAN検索中</span>
                </div>
            </div>

            <div class="info-box">
                <div class="info-label">💻 あなたのPC名</div>
                <div class="info-value">
                    <span id="myName">Loading...</span>
                    <button class="edit-btn" onclick="openNameModal()">✏️ 編集</button>
                </div>
            </div>

            <div class="card">
                <h3 style="margin-bottom: 20px;">🌐 ネットワーク上のデバイス (<span id="peerCount">0</span>台)</h3>
                <div id="peerList">
                    <div class="empty-state">
                        <div class="empty-icon">🔍</div>
                        <div>ネットワークをスキャンしています...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="send-bar" id="sendBar">
        <div class="send-bar-info">
            <span id="selectedCount">0人</span>選択中
        </div>
        <button class="btn-primary" onclick="sendToSelected()">📤 選択したデバイスに送信</button>
        <button class="btn-secondary" onclick="clearSelection()">選択解除</button>
    </div>

    <div class="progress-overlay" id="progressOverlay">
        <div class="progress-box">
            <div class="progress-title" id="progressTitle">📤 送信中...</div>
            <div class="progress-file" id="progressFile"></div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar">0%</div>
            </div>
            <div id="progressText" style="color: #666; margin-top: 10px;"></div>
            <button class="cancel-btn" onclick="cancelTransfer()">キャンセル</button>
        </div>
    </div>

    <div class="modal-overlay" id="nameModal">
        <div class="modal-box">
            <div class="modal-title">💻 PC名の変更</div>
            <input type="text" id="nameInput" class="modal-input" placeholder="PC名を入力" maxlength="30">
            <div class="name-modal-buttons">
                <button class="name-modal-btn name-modal-btn-secondary" onclick="closeNameModal()">キャンセル</button>
                <button class="name-modal-btn name-modal-btn-primary" onclick="saveName()">保存</button>
            </div>
        </div>
    </div>

    <div id="sendModal" class="send-modal">
        <div class="modal-content">
            <div class="modal-header" id="sendModalTitle">メッセージ送信</div>
            <textarea id="messageInput" class="message-input" placeholder="メッセージを入力（任意）..."></textarea>
            
            <div class="file-attach-section" id="fileAttachSection"
                 ondragover="handleFileAttachDragOver(event)"
                 ondragleave="handleFileAttachDragLeave(event)"
                 ondrop="handleFileAttachDrop(event)">
                <div class="attach-buttons">
                    <button class="attach-btn attach-btn-file" onclick="document.getElementById('attachFileInput').click()">
                        📄 ファイルを選択
                    </button>
                    <button class="attach-btn attach-btn-folder" onclick="document.getElementById('attachFolderInput').click()">
                        📁 フォルダを選択
                    </button>
                </div>
                <div id="fileAttachPlaceholder" style="font-size:12px;color:#999;">
                    またはここにドラッグ&ドロップ
                </div>
                <div class="file-list" id="attachedFileList" style="display: none;"></div>
            </div>
            
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeSendModal()">キャンセル</button>
                <button class="modal-btn action" onclick="sendMessage()">送信</button>
            </div>
        </div>
    </div>

    <div id="receivedModal" class="received-modal">
        <div class="modal-content">
            <div class="modal-header">📨 メッセージ受信</div>
            <div class="received-from" id="receivedFrom">From: </div>
            <div class="received-message-body" id="receivedMessageBody"></div>
            <div class="received-files" id="receivedFiles"></div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeReceivedModal()">閉じる</button>
                <button class="modal-btn action" onclick="copyReceivedMessage()">📋 コピー</button>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" style="display: none;" multiple>
    <input type="file" id="attachFileInput" style="display: none;" multiple>
    <input type="file" id="attachFolderInput" style="display: none;" webkitdirectory directory multiple>

    <div id="toast" class="toast"></div>

    <script>
        // ============================================================================
        // バージョン設定（ここでバージョン番号を一括管理）
        // ============================================================================
        const APP_VERSION = '1.0.9';
        const APP_NAME = 'P2Pファイル共有';
        const APP_NAME_ENGLISH = 'P2P File Share';
        
        // バージョン履歴・変更ログ
        const VERSION_INFO = {
            version: APP_VERSION,
            changelog: [
                '✅ IPMessenger風の自動デバイス検出',
                '✅ PC名の自由編集＆即時反映',
                '✅ チェックボックスで複数選択送信',
                '✅ ドラッグ&ドロップでファイル送信',
                '📤 統合送信ボタン（テキスト+ファイル同時送信）',
                '📁 フォルダごと送信・受信機能',
                '💾 フォルダ構造を保持して保存',
                '📎 名前にD&D→送信モーダル（NEW!）',
                '🔔 デスクトップ通知（バックグラウンドでも通知）',
                '🔄 連続送信対応・トースト通知',
                '🔄 自動アップデート機能'
            ]
        };
        
        // アップデートチェック用URL
        const UPDATE_CHECK_URL = 'https://Teru0822.github.io/p2p-file-share-updates/index.html';
        
        // ============================================================================
        // ネットワーク設定
        // ============================================================================
        const BROADCAST_PORT = 45678;      // ブロードキャスト用ポート
        const TRANSFER_PORT = 45679;       // ファイル転送用ポート
        const NOTIFICATION_PORT = 45680;   // 転送通知用ポート
        const BROADCAST_INTERVAL = 1000;   // ブロードキャスト間隔（1秒に短縮）
        const PEER_TIMEOUT = 5000;         // ピアタイムアウト（5秒）
        const UPDATE_CHECK_INTERVAL = 6 * 60 * 60 * 1000; // アップデートチェック間隔（6時間）
        const CHUNK_SIZE = 256 * 1024;     // 転送チャンクサイズ（256KB に増加）
        const CHUNK_DELAY = 0;             // チャンク間遅延なし
        
        // ============================================================================
        // システム初期化
        // ============================================================================
        const { ipcRenderer } = require('electron');
        const os = require('os');
        const dgram = require('dgram');
        const net = require('net');
        const https = require('https');
        
        const CURRENT_VERSION = APP_VERSION;
        
        let myName = localStorage.getItem('p2p_pc_name') || os.hostname() || 'Unknown PC';
        let myIP = getLocalIP();
        let discoveredPeers = new Map();
        let selectedPeers = new Set();
        let broadcastSocket;
        let transferServer;
        let currentTransfer = null;
        let currentSendTarget = null;
        let attachedFiles = [];
        let receivedFilesData = [];
        let peerTimeouts = new Map(); // ピアタイムアウト管理
        
        function getLocalIP() {
            const interfaces = os.networkInterfaces();
            for (const name of Object.keys(interfaces)) {
                for (const iface of interfaces[name]) {
                    if (iface.family === 'IPv4' && !iface.internal) {
                        return iface.address;
                    }
                }
            }
            return '127.0.0.1';
        }
        
        function init() {
            console.log('='.repeat(70));

        function setupTransferServer() {
            transferServer = net.createServer((socket) => {
                // TCP最適化設定
                socket.setKeepAlive(true);
                socket.setNoDelay(true);
                
                let headerBuffer = Buffer.alloc(0);
                let fileInfo = null;
                let streamId = null;
                let receivedSize = 0;
                let expectedSize = 0;
                let isMessage = false;
                let isFolder = false;
                let folderData = null;
                let folderSavePath = null;
                let currentFileInfo = null;
                let isProcessing = false;
                let dataQueue = [];
                
                console.log('📥 接続受付:', socket.remoteAddress);
                
                async function processData(data) {
                    try {
                        // ヘッダー読み込み中
                        if (!fileInfo) {
                            headerBuffer = Buffer.concat([headerBuffer, data]);
                            
                            if (headerBuffer.length >= 4) {
                                const headerSize = headerBuffer.readUInt32BE(0);
                                
                                if (headerBuffer.length >= 4 + headerSize) {
                                    const headerJSON = headerBuffer.slice(4, 4 + headerSize).toString('utf8');
                                    fileInfo = JSON.parse(headerJSON);
                                    const remainingData = headerBuffer.slice(4 + headerSize);
                                    headerBuffer = Buffer.alloc(0);
                                    
                                    console.log('📋 受信データヘッダー:', fileInfo);
                                    
                                    // メッセージ受信
                                    if (fileInfo.type === 'message') {
                                        isMessage = true;
                                        playNotificationSound();
                                        showReceivedMessage(fileInfo.text, fileInfo.from, []);
                                        socket.end();
                                        return;
                                    }
                                    
                                    // フォルダ受信開始
                                    if (fileInfo.type === 'folder') {
                                        isFolder = true;
                                        folderData = {
                                            name: fileInfo.name,
                                            fileCount: fileInfo.fileCount,
                                            files: [],
                                            totalSize: 0
                                        };
                                        
                                        console.log('📁 フォルダ受信開始:', folderData.name);
                                        showProgress('📥 保存先を選択してください...', folderData.name, 0);
                                        
                                        // フォルダ保存先を選択
                                        const result = await ipcRenderer.invoke('select-folder');
                                        if (!result.success) {
                                            showToast('受信キャンセル', true);
                                            socket.end();
                                            hideProgress();
                                            return;
                                        }
                                        
                                        folderSavePath = `${result.folderPath}/${folderData.name}`;
                                        await ipcRenderer.invoke('create-directory', folderSavePath);
                                        
                                        console.log('✅ 保存先選択完了:', folderSavePath);
                                        showProgress('📥 受信中...', folderData.name, 0);
                                        
                                        // 送信側に準備完了を通知
                                        socket.write('READY');
                                        console.log('📤 送信側にREADY信号送信');
                                        
                                        fileInfo = null;
                                        if (remainingData.length > 0) {
                                            await processData(remainingData);
                                        }
                                        return;
                                    }
                                    
                                    // ファイル受信
                                    if (isFolder) {
                                        // フォルダ内のファイル
                                        currentFileInfo = fileInfo;
                                        expectedSize = fileInfo.size;
                                        receivedSize = 0;
                                        
                                        const fullPath = `${folderSavePath}/${fileInfo.path}`.replace(/\\/g, '/');
                                        const fileDir = fullPath.substring(0, fullPath.lastIndexOf('/'));
                                        if (fileDir !== folderSavePath) {
                                            await ipcRenderer.invoke('create-directory', fileDir);
                                        }
                                        
                                        const streamResult = await ipcRenderer.invoke('create-write-stream', fullPath);
                                        streamId = streamResult.streamId;
                                        
                                        console.log('📄 フォルダ内ファイル受信:', fileInfo.name, fileInfo.size, 'bytes');
                                        
                                        fileInfo = null;
                                        if (remainingData.length > 0) {
                                            await processData(remainingData);
                                        }
                                    } else {
                                        // 単独ファイル受信
                                        expectedSize = fileInfo.size;
                                        receivedSize = 0;
                                        showProgress('📥 保存先を選択してください...', fileInfo.name, fileInfo.size);
                                        
                                        const result = await ipcRenderer.invoke('save-file', fileInfo.name, []);
                                        if (!result.success) {
                                            socket.end();
                                            hideProgress();
                                            return;
                                        }
                                        
                                        const streamResult = await ipcRenderer.invoke('create-write-stream', result.filePath);
                                        streamId = streamResult.streamId;
                                        
                                        console.log('📄 ファイル受信開始:', fileInfo.name, fileInfo.size, 'bytes');
                                        console.log('✅ 保存先選択完了:', result.filePath);
                                        showProgress('📥 受信中...', fileInfo.name, fileInfo.size);
                                        
                                        // 送信側に準備完了を通知
                                        socket.write('READY');
                                        console.log('📤 送信側にREADY信号送信');
                                        
                                        fileInfo = null;
                                        if (remainingData.length > 0) {
                                            await processData(remainingData);
                                        }
                                    }
                                }
                            }
                            return;
                        }
                        
                        // ファイルデータ受信中
                        if (streamId && expectedSize > 0) {
                            const writeSize = Math.min(data.length, expectedSize - receivedSize);
                            if (writeSize > 0) {
                                const chunk = data.slice(0, writeSize);
                                
                                await ipcRenderer.invoke('write-stream-chunk', streamId, Array.from(chunk));
                                receivedSize += writeSize;
                                
                                console.log('📊 受信進捗:', receivedSize, '/', expectedSize, 'bytes');
                                
                                // プログレス更新
                                if (isFolder) {
                                    const totalReceived = folderData.totalSize + receivedSize;
                                    const totalExpected = folderData.totalSize + expectedSize;
                                    updateProgress(totalReceived, totalExpected, totalExpected);
                                } else {
                                    updateProgress(receivedSize, expectedSize, expectedSize);
                                }
                                
                                // ファイル受信完了
                                if (receivedSize >= expectedSize) {
                                    await ipcRenderer.invoke('close-write-stream', streamId);
                                    console.log('✅ ファイル書き込み完了:', currentFileInfo ? currentFileInfo.name : 'file', receivedSize, 'bytes');
                                    
                                    streamId = null;
                                    
                                    if (isFolder) {
                                        folderData.files.push({
                                            name: currentFileInfo.name,
                                            path: currentFileInfo.path,
                                            size: currentFileInfo.size
                                        });
                                        folderData.totalSize += currentFileInfo.size;
                                        
                                        console.log(`✅ ファイル受信: ${currentFileInfo.name} (${folderData.files.length}/${folderData.fileCount})`);
                                        
                                        currentFileInfo = null;
                                        receivedSize = 0;
                                        expectedSize = 0;
                                        
                                        // 全ファイル受信完了チェック
                                        if (folderData.files.length >= folderData.fileCount) {
                                            hideProgress();
                                            playNotificationSound();
                                            showToast(`✅ フォルダ受信完了: ${folderData.name}`);
                                            alert(`✅ フォルダ受信完了！\n\nフォルダ: ${folderData.name}\n保存先: ${folderSavePath}\nファイル数: ${folderData.files.length}`);
                                            socket.end();
                                            return;
                                        }
                                    } else {
                                        hideProgress();
                                        playNotificationSound();
                                        showToast('✅ ファイル受信完了');
                                        socket.end();
                                        return;
                                    }
                                }
                                
                                // 残りのデータを処理
                                if (writeSize < data.length) {
                                    const remaining = data.slice(writeSize);
                                    await processData(remaining);
                                }
                            }
                        }
                    } catch (err) {
                        console.error('❌ データ処理エラー:', err);
                        if (streamId) {
                            await ipcRenderer.invoke('close-write-stream', streamId);
                        }
                        hideProgress();
                        showToast('❌ 受信エラー: ' + err.message, true);
                        socket.end();
                    }
                }
                
                socket.on('data', (data) => {
                    dataQueue.push(data);
                    
                    if (!isProcessing) {
                        isProcessing = true;
                        
                        (async () => {
                            while (dataQueue.length > 0) {
                                const chunk = dataQueue.shift();
                                await processData(chunk);
                            }
                            isProcessing = false;
                        })();
                    }
                });
                
                socket.on('end', () => {
                    console.log('🔌 接続終了');
                });
                
                socket.on('error', async (err) => {
                    console.error('❌ ソケットエラー:', err);
                    if (streamId) {
                        await ipcRenderer.invoke('close-write-stream', streamId);
                    }
                    hideProgress();
                });
            });
            
            transferServer.listen(TRANSFER_PORT, () => {
                console.log('✅ TCP転送サーバー起動:', TRANSFER_PORT);
            });
        }
        // フォルダ受信完了時の処理（削除済み - 新しいストリーミング受信では不要）

        function sendFilesToMultiple(targets, files) {
            let targetIndex = 0, fileIndex = 0;
            
            function sendNext() {
                if (targetIndex >= targets.length) {
                    return alert(`✅ 全送信完了！\n\n送信先: ${targets.length}台\nファイル数: ${files.length}`);
                }
                if (fileIndex >= files.length) {
                    targetIndex++;
                    fileIndex = 0;
                    return setTimeout(sendNext, 500);
                }
                sendFileData(targets[targetIndex], files[fileIndex], () => {
                    fileIndex++;
                    setTimeout(sendNext, 500);
                });
            }
            sendNext();
        }
        
        function sendFileData(targetIP, file, callback) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const fileData = Buffer.from(e.target.result);
                const fileInfo = { name: file.name, type: file.type, size: file.size };
                
                const client = net.createConnection({ port: TRANSFER_PORT, host: targetIP }, () => {
                    console.log('📤 ファイル送信開始:', targetIP, file.name);
                    showProgress('📤 送信中...', file.name, file.size);
                    
                    const headerJSON = JSON.stringify(fileInfo);
                    const headerBuffer = Buffer.from(headerJSON, 'utf8');
                    const headerSize = Buffer.alloc(4);
                    headerSize.writeUInt32BE(headerBuffer.length, 0);
                    
                    client.write(headerSize);
                    client.write(headerBuffer);
                    
                    const CHUNK_SIZE = 64 * 1024;
                    let offset = 0;
                    
                    function sendChunk() {
                        if (currentTransfer && currentTransfer.cancelled) {
                            client.end();
                            hideProgress();
                            if (callback) callback();
                            return;
                        }
                        if (offset >= fileData.length) {
                            client.end();
                            hideProgress();
                            console.log('✅ ファイル送信完了:', file.name);
                            if (!callback) alert(`✅ 送信完了！\n\nファイル: ${file.name}`);
                            if (callback) callback();
                            return;
                        }
                        const chunk = fileData.slice(offset, offset + CHUNK_SIZE);
                        client.write(chunk, () => {
                            offset += chunk.length;
                            updateProgress(offset, fileData.length, fileData.length);
                            setTimeout(sendChunk, 10);
                        });
                    }
                    currentTransfer = { cancelled: false };
                    sendChunk();
                });
                
                client.on('error', (err) => {
                    console.error('❌ 送信エラー:', err);
                    hideProgress();
                    if (callback) callback();
                });
            };
            reader.readAsArrayBuffer(file);
        }
        
        function handleDragOver(event, ip) {
            event.preventDefault();
            event.stopPropagation();
            document.getElementById('peer-' + ip.replace(/\./g, '-')).classList.add('drag-over');
        }
        
        function handleDragLeave(event, ip) {
            event.preventDefault();
            document.getElementById('peer-' + ip.replace(/\./g, '-')).classList.remove('drag-over');
        }
        
        function handleDrop(event, ip) {
            event.preventDefault();
            event.stopPropagation();
            document.getElementById('peer-' + ip.replace(/\./g, '-')).classList.remove('drag-over');
            
            const peer = discoveredPeers.get(ip);
            if (!peer) return;
            
            // ドロップされたアイテムを処理
            const items = event.dataTransfer.items;
            const droppedFiles = [];
            const droppedFolders = [];
            
            if (items) {
                // DataTransferItemListを使用（フォルダ対応）
                const promises = [];
                
                for (let i = 0; i < items.length; i++) {
                    const item = items[i];
                    if (item.kind === 'file') {
                        const entry = item.webkitGetAsEntry ? item.webkitGetAsEntry() : null;
                        
                        if (entry) {
                            if (entry.isDirectory) {
                                // フォルダの場合：フォルダ情報を保持
                                promises.push(
                                    readDirectoryEntries(entry, entry.name).then(files => {
                                        droppedFolders.push({
                                            name: entry.name,
                                            files: files,
                                            isFolder: true
                                        });
                                    })
                                );
                            } else {
                                // ファイルの場合
                                const file = item.getAsFile();
                                droppedFiles.push({
                                    file: file,
                                    path: file.name,
                                    isFolder: false
                                });
                            }
                        }
                    }
                }
                
                // すべてのフォルダ読み込みが完了してから処理
                Promise.all(promises).then(() => {
                    // フォルダとファイルを統合
                    const allItems = [...droppedFolders, ...droppedFiles];
                    
                    // 送信モーダルを開く
                    openSendModalWithFiles(ip, peer.name, allItems);
                });
                
            } else {
                // 古いブラウザ用のフォールバック
                const files = Array.from(event.dataTransfer.files);
                const fileItems = files.map(file => ({
                    file: file,
                    path: file.name,
                    isFolder: false
                }));
                openSendModalWithFiles(ip, peer.name, fileItems);
            }
        }
        
        // フォルダ内のファイルを再帰的に読み込む
        function readDirectoryEntries(directoryEntry, basePath = '') {
            return new Promise((resolve) => {
                const dirReader = directoryEntry.createReader();
                const allFiles = [];
                
                function readEntries() {
                    dirReader.readEntries((entries) => {
                        if (entries.length === 0) {
                            resolve(allFiles);
                            return;
                        }
                        
                        const promises = [];
                        entries.forEach(entry => {
                            if (entry.isFile) {
                                promises.push(new Promise((resolveFile) => {
                                    entry.file(file => {
                                        // basePath からフォルダ名を除いた相対パスを作成
                                        const relativePath = basePath.split('/').slice(1).join('/');
                                        const fullPath = relativePath ? relativePath + '/' + entry.name : entry.name;
                                        allFiles.push({
                                            file: file,
                                            path: fullPath,
                                            isFolder: false
                                        });
                                        resolveFile();
                                    });
                                }));
                            } else if (entry.isDirectory) {
                                promises.push(
                                    readDirectoryEntries(entry, basePath + '/' + entry.name)
                                        .then(subFiles => {
                                            allFiles.push(...subFiles);
                                        })
                                );
                            }
                        });
                        
                        Promise.all(promises).then(() => {
                            readEntries(); // 次のバッチを読み込む
                        });
                    });
                }
                
                readEntries();
            });
        }

            const itemsToSend = [...attachedFiles];

            // 送信前に入力内容をクリア（連続送信可能にするため）
            document.getElementById('messageInput').value = '';

                    itemCount: itemsToSend.length
                });
                
                // テキストのみの場合
                if (itemsToSend.length === 0) {

                    hideProgress();

                    await sendMessageData(targetIP, textToSend, [], targetName);
                    hideProgress();
                    await new Promise(resolve => setTimeout(resolve, 500));
                }
                
                // ファイル/フォルダを送信
                for (let i = 0; i < itemsToSend.length; i++) {

        // バイナリファイルを送信する関数
        function sendFileBinary(targetIP, fileInfo, fileData) {
            return new Promise((resolve, reject) => {
                const client = net.createConnection({ 
                    port: TRANSFER_PORT, 
                    host: targetIP,
                    // TCP最適化設定
                    keepAlive: true,
                    noDelay: true  // Nagleアルゴリズムを無効化して遅延を減らす
                }, () => {
                    console.log('📤 ファイル送信開始:', targetIP, fileInfo.name);
                    showProgress('📤 送信中...', fileInfo.name, fileInfo.size);
                    
                    const headerJSON = JSON.stringify(fileInfo);
                    const headerBuffer = Buffer.from(headerJSON, 'utf8');
                    const headerSize = Buffer.alloc(4);
                    headerSize.writeUInt32BE(headerBuffer.length, 0);
                    
                    client.write(headerSize);
                    client.write(headerBuffer);
                    
                    console.log('📤 ファイル情報送信完了、受信側の準備を待機中...');
                    
                    // 受信側からの準備完了信号を待つ
                    let receivedReady = false;
                    
                    client.once('data', (readySignal) => {
                        const signal = readySignal.toString('utf8');
                        console.log('📥 受信側から信号:', signal);
                        
                        if (signal === 'READY') {
                            receivedReady = true;
                            console.log('✅ 受信側準備完了、データ送信開始');
                            
                            let offset = 0;
                            
                            function sendChunk() {
                                if (currentTransfer && currentTransfer.cancelled) {
                                    client.end();
                                    hideProgress();
                                    reject(new Error('キャンセルされました'));
                                    return;
                                }
                                if (offset >= fileData.length) {
                                    client.end();
                                    console.log('✅ ファイル送信完了:', fileInfo.name);
                                    resolve();
                                    return;
                                }
                                const chunk = fileData.slice(offset, offset + CHUNK_SIZE);
                                const canContinue = client.write(chunk);
                                offset += chunk.length;
                                updateProgress(offset, fileData.length, fileInfo.size);
                                
                                if (canContinue) {
                                    // バッファに余裕がある場合は即座に次を送信
                                    setImmediate(sendChunk);
                                } else {
                                    // バッファが満杯の場合はdrainを待つ
                                    client.once('drain', sendChunk);
                                }
                            }
                            currentTransfer = { cancelled: false };
                            sendChunk();
                        } else {
                            console.error('❌ 不明な信号:', signal);
                            client.destroy();
                            reject(new Error('受信側から不明な信号'));
                        }
                    });
                    
                    // タイムアウト（30秒）
                    setTimeout(() => {
                        if (!receivedReady) {
                            console.error('❌ 受信側準備タイムアウト');
                            client.destroy();
                            reject(new Error('受信側の準備タイムアウト'));
                        }
                    }, 30000);
                });
                
                client.on('error', (err) => {
                    console.error('❌ 送信エラー:', err);
                    hideProgress();
                    reject(err);
                });
            });
        }
        
        function sendMessageData(targetIP, text, filesData, targetName) {
            return new Promise((resolve, reject) => {
                const client = new net.Socket();
                let connected = false;
                
                const timeout = setTimeout(() => {
                    if (!connected) {
                        client.destroy();
                        reject(new Error('接続タイムアウト'));
                    }
                }, 10000);
                
                client.connect(TRANSFER_PORT, targetIP, () => {
                    connected = true;
                    clearTimeout(timeout);
                    
                    console.log('🔗 接続成功:', targetIP);
                    
                    // メッセージのみを送信（ファイルデータは含めない）
                    const metadata = {
                        type: 'message',

                        from: myName,

                        fileCount: 0,  // ファイルは別途送信
                        files: []
                    };

                    const headerSize = Buffer.alloc(4);

                    console.log('📤 メッセージ送信:', {
                        textLength: text.length,
                        headerSize: headerBuffer.length
                    });
                    
                    client.write(headerSize);
                    client.write(headerBuffer, () => {
                        console.log('✅ メッセージ書き込み完了');
                        setTimeout(() => {
                            client.end();

                });
                
                client.on('end', () => {

                });
                
                client.on('error', (err) => {
                    console.error('❌ 接続エラー:', err);
                    clearTimeout(timeout);
                    reject(err);
                });
            });
        }

            }
            
            console.log('📁 フォルダ保存:', folderName, folderFiles.length, '個のファイル');
            
            try {
                const result = await ipcRenderer.invoke('select-folder');
                if (!result.success) return;
                
                const basePath = result.folderPath;
                let savedCount = 0;
                
                for (const file of folderFiles) {
                    const filePath = `${basePath}/${file.path}`;
                    
                    const saveResult = await ipcRenderer.invoke('save-file-to-path', filePath, file.data);
                    if (saveResult.success) {
                        savedCount++;
                    }
                }
                
                alert(`✅ フォルダ保存完了！\n\n保存先: ${basePath}/${folderName}\nファイル数: ${savedCount}/${folderFiles.length}`);
            } catch (err) {
                console.error('❌ フォルダ保存エラー:', err);
                alert('❌ フォルダ保存エラー: ' + err.message);
            }
        }
        
        function closeReceivedModal() {
            document.getElementById('receivedModal').classList.remove('active');
        }
        
        function copyReceivedMessage() {
            const text = document.getElementById('receivedMessageBody').textContent;
            if (text && text !== '（メッセージなし）') {
                navigator.clipboard.writeText(text).then(() => {
                    alert('✅ クリップボードにコピーしました');
                });
            }
        }
        
        function showProgress(title, fileName, fileSize) {
            document.getElementById('progressTitle').textContent = title;
            document.getElementById('progressFile').textContent = fileName;
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('progressBar').textContent = '0%';
            document.getElementById('progressOverlay').classList.add('show');
        }
        
        function updateProgress(current, total, fileSize) {
            const percent = Math.round((current / total) * 100);
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressBar').textContent = percent + '%';
            document.getElementById('progressText').textContent = 
                `${formatBytes(current)} / ${formatBytes(fileSize)}`;
        }
        
        function hideProgress() {
            document.getElementById('progressOverlay').classList.remove('show');
            currentTransfer = null;
        }
        
        function cancelTransfer() {
            if (currentTransfer) currentTransfer.cancelled = true;
            hideProgress();
        }
        
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }
        
        function playNotificationSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(600, audioContext.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.2);
        }
        
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show' + (isError ? ' error' : '');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        function showDesktopNotification(title, body, onClick) {
            // デスクトップ通知を表示
            if (!('Notification' in window)) {
                console.log('このブラウザはデスクトップ通知に対応していません');
                return;
            }
            
            // 権限をチェック
            if (Notification.permission === 'granted') {
                createNotification(title, body, onClick);
            } else if (Notification.permission !== 'denied') {
                Notification.requestPermission().then(permission => {
                    if (permission === 'granted') {
                        createNotification(title, body, onClick);
                    }
                });
            }
        }
        
        function createNotification(title, body, onClick) {
            const notification = new Notification(title, {
                body: body,
                icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="%23667eea"/><text x="50" y="65" font-size="50" text-anchor="middle" fill="white">📤</text></svg>',
                badge: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="%23667eea"/></svg>',
                tag: 'p2p-file-share',
                requireInteraction: false,
                silent: false
            });
            
            notification.onclick = () => {
                window.focus();
                if (onClick) onClick();
                notification.close();
            };
            
            // 5秒後に自動的に閉じる
            setTimeout(() => {
                notification.close();
            }, 5000);
        }
        
        function openNameModal() {
            document.getElementById('nameInput').value = myName;
            const modal = document.getElementById('nameModal');
            modal.style.display = 'flex'; // 追加
            modal.classList.add('show');
            document.getElementById('nameInput').focus();
        }

        function closeNameModal() {
            const modal = document.getElementById('nameModal');
            modal.classList.remove('show');
            modal.style.display = 'none'; // 追加：これで確実に消えます
        }
        
        function saveName() {
            const newName = document.getElementById('nameInput').value.trim();
            if (newName && newName.length > 0) {
                myName = newName;
                localStorage.setItem('p2p_pc_name', myName);
                document.getElementById('myName').textContent = myName;
                closeNameModal();
                
                const message = JSON.stringify({ type: 'announce', name: myName, ip: myIP });
                broadcastSocket.send(message, BROADCAST_PORT, '255.255.255.255');
                
                console.log('✅ PC名変更:', myName);
            } else {
                alert('PC名を入力してください');
            }
        }
        
        function checkForUpdates() {
            console.log('🔍 アップデートチェック開始...');
            console.log('📥 URL:', UPDATE_CHECK_URL);
            
            https.get(UPDATE_CHECK_URL, (res) => {
                let data = '';
                res.on('data', (chunk) => { data += chunk; });
                res.on('end', () => {
                    try {
                        // APP_VERSIONを探す（新方式）
                        let match = data.match(/const APP_VERSION = ['"]([^'"]+)['"]/);
                        let remoteVersion = null;
                        
                        if (match) {
                            remoteVersion = match[1];
                            console.log('✅ APP_VERSIONを検出:', remoteVersion);
                        } else {
                            // 旧方式のVERSION_INFOも試す（下位互換性）
                            match = data.match(/const VERSION_INFO = \{[\s\S]*?version: ['"]([^'"]+)['"]/);
                            if (match) {
                                remoteVersion = match[1];
                                console.log('✅ VERSION_INFO.versionを検出:', remoteVersion);
                            }
                        }
                        
                        if (!remoteVersion) {
                            console.log('⚠️ リモートバージョン情報が見つかりません');
                            console.log('📄 取得したデータの先頭100文字:', data.substring(0, 100));
                            return;
                        }
                        
                        const ignoredVersion = localStorage.getItem('ignored_update_version');
                        if (remoteVersion === ignoredVersion) {
                            console.log('⏭️ このバージョンは無視リストに登録済み:', remoteVersion);
                            return;
                        }
                        
                        console.log('📊 バージョン比較:');
                        console.log('  現在:', CURRENT_VERSION);
                        console.log('  リモート:', remoteVersion);
                        
                        if (remoteVersion !== CURRENT_VERSION) {
                            console.log('🎉 新しいバージョンを検出:', remoteVersion);
                            
                            // changelogを取得（オプション）
                            const changelogMatch = data.match(/changelog: \[([\s\S]*?)\]/);
                            let changelog = [];
                            if (changelogMatch) {
                                try {
                                    const changelogStr = '[' + changelogMatch[1] + ']';
                                    changelog = eval(changelogStr);
                                } catch (e) {
                                    console.log('⚠️ 変更ログの解析に失敗');
                                }
                            }
                            
                            showUpdateBanner({ version: remoteVersion, changelog: changelog });
                        } else {
                            console.log('✅ 最新版です');
                        }
                    } catch (err) {
                        console.error('❌ アップデートチェックエラー:', err);
                        console.error('❌ エラー詳細:', err.stack);
                    }
                });
            }).on('error', (err) => {
                console.error('❌ HTTP取得エラー:', err);
            });
        }
        
        function showUpdateBanner(versionInfo) {
            if (document.querySelector('.update-banner')) return;
            
            const banner = document.createElement('div');
            banner.className = 'update-banner';
            banner.innerHTML = `
                🎉 新しいバージョン ${versionInfo.version} が利用可能です！<br>クリックしてアップデート
                <button class="update-banner-close" onclick="event.stopPropagation(); ignoreUpdate('${versionInfo.version}'); this.parentElement.remove();">×</button>
            `;
            banner.onclick = () => applyUpdate(versionInfo);
            document.body.appendChild(banner);
        }
        
        async function applyUpdate(versionInfo) {
            const banner = document.querySelector('.update-banner');
            if (banner) banner.remove();
            
            console.log('⬇️ アップデート開始:', versionInfo.version);
            showProgress('⬇️ アップデート中...', 'index.htmlをダウンロードしています', 0);
            
            try {
                const result = await ipcRenderer.invoke('download-update', UPDATE_CHECK_URL, versionInfo.version);
                hideProgress();
                
                if (result.success) {
                    console.log('✅ ファイル保存成功:', result.filePath);
                    localStorage.setItem('app_version', versionInfo.version);
                    console.log('✅ localStorage保存:', versionInfo.version);
                    
                    const restartMsg = document.createElement('div');
                    restartMsg.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:40px;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.5);z-index:9999;text-align:center;';
                    restartMsg.innerHTML = `
                        <div style="font-size:24px;font-weight:bold;margin-bottom:10px;">✅ アップデート完了</div>
                        <div style="color:#666;margin-bottom:20px;">v${versionInfo.version} にアップデートしました</div>
                        <div style="color:#666;">3秒後に自動で再起動します...</div>
                    `;
                    document.body.appendChild(restartMsg);
                    
                    setTimeout(async () => {
                        console.log('🔄 再起動実行');
                        await ipcRenderer.invoke('restart-app');
                    }, 3000);
                } else {
                    console.error('❌ アップデート失敗:', result.error);
                    alert('❌ アップデートに失敗しました: ' + result.error);
                }
            } catch (err) {
                hideProgress();
                console.error('❌ アップデートエラー:', err);
                alert('❌ アップデートエラー: ' + err.message);
            }
        }
        
        function ignoreUpdate(version) {
            localStorage.setItem('ignored_update_version', version);
            console.log('⏭️ アップデート無視:', version);
        }
        
        setInterval(updatePeerList, 2000);
        init();
    </script>
